# dart run flutter_launcher_icons
#
# Platform icon sources (SVG → PNG export required before running):
#   Android:  assets/icon/android/ic_launcher_{foreground,background,monochrome}.svg
#   Windows:  assets/icon/windows/app_icon.svg
#   macOS:    assets/icon/macos/app_icon.svg
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"

  android: "launcher_icon"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "assets/icon/android/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icon/android/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icon/android/ic_launcher_monochrome.png"

  ios: false
  remove_alpha_ios: true

  web:
    generate: false
    image_path: "assets/icon/web/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/icon/windows/app_icon.png"
    icon_size: 256 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icon/macos/app_icon.png"

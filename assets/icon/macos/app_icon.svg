<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    macOS HIG: 1024x1024 canvas, 824x824 icon shape at (100,100),
    corner radius 185.4px. macOS does not auto-mask, so the rounded
    rect is part of the icon.
  -->
  <defs>
    <clipPath id="iconShape">
      <rect x="100" y="100" width="824" height="824" rx="185.4" ry="185.4"/>
    </clipPath>
  </defs>

  <!-- Icon background (clipped to macOS rounded rect) -->
  <g clip-path="url(#iconShape)">
    <rect x="100" y="100" width="824" height="824" rx="185.4" fill="#F5C842"/>
    <ellipse cx="331" cy="298" rx="297" ry="231" fill="#FFE066" opacity="0.45"/>

    <!--
      Foreground content: original elements scaled 1.41x and centered
      at (512, 512) to sit within the icon shape with ~15% inner margin.
    -->
    <g transform="translate(512, 512) scale(1.41) translate(-397.5, -356.5)">
      <!-- Lemonade glass body -->
      <polygon points="250,210 430,210 405,510 275,510" fill="#B3E5FC" opacity="0.55"/>
      <polygon points="265,220 295,220 278,495 265,495" fill="white" opacity="0.30"/>

      <!-- Liquid -->
      <polygon points="254,295 426,295 405,510 275,510" fill="#C8E64A" opacity="0.88"/>

      <!-- Lemon slice -->
      <circle cx="320" cy="390" r="38" fill="#FFE033" opacity="0.95"/>
      <line x1="320" y1="352" x2="320" y2="428" stroke="#F9A825" stroke-width="2.5"/>
      <line x1="282" y1="390" x2="358" y2="390" stroke="#F9A825" stroke-width="2.5"/>
      <line x1="293" y1="363" x2="347" y2="417" stroke="#F9A825" stroke-width="1.8"/>
      <line x1="293" y1="417" x2="347" y2="363" stroke="#F9A825" stroke-width="1.8"/>
      <circle cx="320" cy="390" r="38" fill="none" stroke="#F9A825" stroke-width="2"/>

      <!-- Bubbles -->
      <circle cx="290" cy="335" r="7" fill="white" opacity="0.5"/>
      <circle cx="388" cy="455" r="6" fill="white" opacity="0.4"/>
      <circle cx="308" cy="470" r="4" fill="white" opacity="0.4"/>

      <!-- Glass rim -->
      <rect x="245" y="200" width="190" height="20" rx="10" fill="#E0F7FA" opacity="0.75"/>
      <!-- Glass outline -->
      <polygon points="250,210 430,210 405,510 275,510" fill="none" stroke="white" stroke-width="3" opacity="0.55"/>

      <!-- Straw -->
      <rect x="388" y="158" width="16" height="200" rx="8" fill="#FF7043" opacity="0.9"/>
      <rect x="388" y="158" width="8" height="200" rx="8" fill="#FFAB91" opacity="0.55"/>

      <!-- CLI Terminal -->
      <rect x="300" y="400" width="250" height="155" rx="14" fill="#1A1A2E"/>
      <rect x="300" y="400" width="250" height="26" rx="14" fill="#21262D"/>
      <rect x="300" y="412" width="250" height="14" fill="#21262D"/>
      <text x="320" y="450" font-family="monospace" font-size="20" fill="#39D353">$ load llama3</text>
      <text x="320" y="478" font-family="monospace" font-size="20" fill="#888">$ unload gpt2</text>
      <text x="320" y="506" font-family="monospace" font-size="20" fill="#39D353">$ pull phi3</text>
      <rect x="320" y="516" width="10" height="16" rx="2" fill="#39D353" opacity="0.9"/>
      <rect x="300" y="400" width="250" height="155" rx="14" fill="none" stroke="#F5C842" stroke-width="3.5"/>
    </g>
  </g>
</svg>

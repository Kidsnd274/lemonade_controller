<svg xmlns="http://www.w3.org/2000/svg" viewBox="47 7 700 700">
  <!-- Lemonade glass body -->
  <polygon points="250,210 430,210 405,510 275,510" fill="black" opacity="0.15"/>

  <!-- Liquid -->
  <polygon points="254,295 426,295 405,510 275,510" fill="black" opacity="0.35"/>

  <!-- Lemon slice -->
  <circle cx="320" cy="390" r="38" fill="black" opacity="0.25"/>
  <line x1="320" y1="352" x2="320" y2="428" stroke="black" stroke-width="2.5" opacity="0.5"/>
  <line x1="282" y1="390" x2="358" y2="390" stroke="black" stroke-width="2.5" opacity="0.5"/>
  <line x1="293" y1="363" x2="347" y2="417" stroke="black" stroke-width="1.8" opacity="0.5"/>
  <line x1="293" y1="417" x2="347" y2="363" stroke="black" stroke-width="1.8" opacity="0.5"/>
  <circle cx="320" cy="390" r="38" fill="none" stroke="black" stroke-width="2" opacity="0.5"/>

  <!-- Glass rim -->
  <rect x="245" y="200" width="190" height="20" rx="10" fill="black" opacity="0.2"/>
  <!-- Glass outline -->
  <polygon points="250,210 430,210 405,510 275,510" fill="none" stroke="black" stroke-width="3" opacity="0.3"/>

  <!-- Straw -->
  <rect x="388" y="158" width="16" height="200" rx="8" fill="black" opacity="0.5"/>

  <!-- CLI Terminal -->
  <rect x="300" y="400" width="250" height="155" rx="14" fill="black" opacity="0.8"/>
  <rect x="300" y="400" width="250" height="26" rx="14" fill="black" opacity="0.9"/>
  <rect x="300" y="412" width="250" height="14" fill="black" opacity="0.9"/>
  <text x="320" y="450" font-family="monospace" font-size="20" fill="white" opacity="0.9">$ load llama3</text>
  <text x="320" y="478" font-family="monospace" font-size="20" fill="white" opacity="0.5">$ unload gpt2</text>
  <text x="320" y="506" font-family="monospace" font-size="20" fill="white" opacity="0.9">$ pull phi3</text>
  <rect x="320" y="516" width="10" height="16" rx="2" fill="white" opacity="0.7"/>
  <rect x="300" y="400" width="250" height="155" rx="14" fill="none" stroke="black" stroke-width="3.5" opacity="0.6"/>
